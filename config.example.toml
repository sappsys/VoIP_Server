[server]
bind_host = "0.0.0.0"
bind_port = 5060
transport = "udp"
# LAN/WAN IP phones and RTP must use (required on multi-homed / Docker hosts).
external_host = "192.168.1.100"
realm = "voip.local"
moh_dir = "assets/moh"
# SIP OPTIONS keepalive to registered phones (seconds). Default 30.
options_keepalive_seconds = 30
# SIP OPTIONS keepalive to trunks with keepalive=options (seconds). Default 30. Set 0 to disable.
trunk_keepalive_seconds = 30
# REGISTER expiry bounds (seconds).
register_min_expiry = 60
register_max_expiry = 3600
# Keep the Contact host from the phone instead of rewriting private LAN IPs to the packet source.
preserve_contact_host = false

[logging]
# Level: debug, info, warn, error
level = "info"

# Voice codecs offered in SDP (preference order, first = most preferred).
# Supported: PCMU PCMA G722 G729 G723-63 G723-53 G726-32 G726-16 G726-24 G726-40
# Omit to use the full default set. telephone-event (DTMF) is added automatically.
[media]
codecs = ["PCMU", "PCMA", "G722", "G729", "G723-63", "G723-53", "G726-32", "G726-16", "G726-24", "G726-40"]

[limits]
max_calls = 200
max_extensions = 400

[web]
listen = "0.0.0.0:7030"
session_secret = "change-me-in-production"
session_ttl_hours = 24

[database]
path = "data/pbx.db"

[paths]
extensions_dir = "extensions"
# Optional: extra static remote-phonebook XML files served under /phonebook/<name>.xml.
# The database-backed /phonebook/directory.xml is always available.
phonebook_dir = "phonebook"

# Voice prompts played to callers. Files are relative to `dir` (or absolute).
# Leave a value empty ("") to disable that prompt and fall back to a SIP status.
[sounds]
dir = "assets/sounds"
busy = "is-curntly-busy.wav"                 # recipient busy, no call waiting
wrong_number = "you-dialed-wrong-number.wav" # invalid/unknown number dialed
conf_pin = "confbridge-pin.wav"              # ask for conference PIN
conf_pin_bad = "confbridge-pin-bad.wav"      # wrong PIN (then re-request)
unavailable = "vm-nobodyavail.wav"           # extension unregistered/unavailable
extension = "extension.wav"                  # prompt for extension (park retrieve)

# Star codes (defaults shown; omit * in values if you prefer — it is added automatically)
[features]
redial = "*66"
call_return = "*69"
transfer = "*77"
park = "*85"
park_retrieve = "*86"
dnd_activate = "*78"
dnd_deactivate = "*79"

[[web.users]]
username = "admin"
password = "admin"
role = "admin"

# Trunk connection details (inbound routing configured via web UI → SQLite)
# [[trunks]]
# id = 1
# name = "Provider-A"
# prefix = "90"
